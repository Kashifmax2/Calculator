<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="calculator" role="application" aria-label="Calculator">
<div class="chrome" aria-hidden="true">
<span class="dot"></span><span class="dot"></span><span class="dot"></span>
</div>


<div class="display" aria-live="polite" aria-atomic="true">
<div id="history" class="history"></div>
<div id="output" class="output">0</div>
</div>


<div class="keys">
<button class="key fn danger" data-action="clear" aria-label="Clear">C</button>
<button class="key fn" data-action="backspace" aria-label="Backspace">⌫</button>
<button class="key fn" data-action="percent" aria-label="Percent">%</button>
<button class="key op" data-action="op" data-op="/" aria-label="Divide">÷</button>


<button class="key" data-num="7">7</button>
<button class="key" data-num="8">8</button>
<button class="key" data-num="9">9</button>
<button class="key op" data-action="op" data-op="*" aria-label="Multiply">×</button>


<button class="key" data-num="4">4</button>
<button class="key" data-num="5">5</button>
<button class="key" data-num="6">6</button>
<button class="key op" data-action="op" data-op="-" aria-label="Subtract">−</button>


<button class="key" data-num="1">1</button>
<button class="key" data-num="2">2</button>
<button class="key" data-num="3">3</button>
<button class="key op" data-action="op" data-op="+" aria-label="Add">+</button>


<button class="key span-2" data-num="0" aria-label="Zero">0</button>
<button class="key" data-action="dot" aria-label="Decimal point">.</button>
<button class="key op" data-action="equals" aria-label="Equals">=</button>
</div>
</div>


<script src="app.js"></script>
</body>
</html>
